# nginx/nginx.conf
events {
    worker_connections 1024;
}

http {
    # ==============================================
    # 🔧 ОСНОВНЫЕ НАСТРОЙКИ
    # ==============================================
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    
    # ==============================================
    # 🔐 SSL НАСТРОЙКИ (МАКСИМАЛЬНАЯ БЕЗОПАСНОСТЬ)
    # ==============================================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    
    # DH параметры для Perfect Forward Secrecy
    ssl_dhparam /etc/nginx/ssl/dhparam.pem;
    
    # Настройки сессий
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # OCSP Stapling (ускоряет проверку сертификатов)
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # ==============================================
    # 🛡️ ЗАГОЛОВКИ БЕЗОПАСНОСТИ
    # ==============================================
    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # XSS защита
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Защита от MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy (настрой под свой фронтенд)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
    
    # ==============================================
    # 📊 ЛОГИРОВАНИЕ
    # ==============================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;
    
    # ==============================================
    # 🚀 UPSTREAM (FastAPI бэкенд)
    # ==============================================
    upstream api_backend {
        least_conn;  # Балансировка по наименьшему количеству соединений
        server api:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    # ==============================================
    # 🎯 ОСНОВНОЙ СЕРВЕР (HTTPS)
    # ==============================================
    server {
        listen 443 ssl http2;
        server_name localhost;
        
        # SSL сертификаты
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        
        # ==========================================
        # 📁 СТАТИЧЕСКИЕ ФАЙЛЫ (если есть)
        # ==========================================
        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        
        # ==========================================
        # 🔌 API ПРОКСИРОВАНИЕ
        # ==========================================
        location /docs {
            proxy_pass http://api_backend/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Важно для Swagger!
            proxy_buffering off;
            proxy_cache off;
        }

        location /openapi.json {
            proxy_pass http://api_backend/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
        
        # ==========================================
        # 📊 ДОКУМЕНТАЦИЯ
        # ==========================================
        location /docs {
            proxy_pass http://api_backend/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /openapi.json {
            proxy_pass http://api_backend/openapi.json;
            proxy_set_header Host $host;
        }
        
        # ==========================================
        # ❤️ HEALTH CHECK
        # ==========================================
        location /health {
            proxy_pass http://api_backend/health;
            access_log off;
        }
        
        # ==========================================
        # 📊 METRICS (если есть)
        # ==========================================
        location /metrics {
            proxy_pass http://api_backend/metrics;
            allow 127.0.0.1;
            deny all;
        }
    }
    
    # ==============================================
    # 🔄 РЕДИРЕКТ HTTP → HTTPS
    # ==============================================
    server {
        listen 80;
        server_name localhost;
        
        # Перенаправляем все запросы на HTTPS
        return 301 https://$server_name$request_uri;
    }
}