<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Офисы | Бизнес-центр</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Фоновое изображение на верхней части страницы -->
    <div class="hero-bg"></div>

    <div class="container">
        <div class="page-header">
            <h1>Найдите идеальный офис</h1>
            <p>Более 50 офисов от 20 до 200 м² в центре города</p>
        </div>

        <div class="filters-section">
            <div class="filters-title">
                Подбор по параметрам
            </div>
            
            <div class="filters-grid">
                <div class="filter-group">
                    <span class="filter-label">Этаж</span>
                    <select class="filter-select" id="floorFilter">
                        <option value="all">Любой этаж</option>
                        <option value="1">1 этаж</option>
                        <option value="2">2 этаж</option>
                        <option value="3">3 этаж</option>
                        <option value="4">4 этаж</option>
                        <option value="5">5 этаж</option>
                    </select>
                </div>

                <div class="filter-group">
                    <span class="filter-label">Цена за месяц</span>
                    <div class="filter-range">
                        <input type="number" id="minPrice" placeholder="от">
                        <span>—</span>
                        <input type="number" id="maxPrice" placeholder="до">
                    </div>
                </div>

                <div class="filter-group">
                    <span class="filter-label">Площадь</span>
                    <div class="filter-range">
                        <input type="number" id="minArea" placeholder="от">
                        <span>—</span>
                        <input type="number" id="maxArea" placeholder="до">
                    </div>
                </div>
            </div>

            <div class="filter-actions">
                <button class="btn-secondary" id="resetFilters">Сбросить</button>
                <button class="btn" id="applyFilters">Применить</button>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin: 30px 0 20px;">
            <div style="font-size: 16px; color: #64748b;">
                Найдено <strong id="officesCount" style="color: #466c55;">6</strong> офисов
            </div>
            <select class="filter-select" id="sortSelect" style="padding: 10px 16px; border: 1px solid #e2e8f0; border-radius: 12px; background: white;">
                <option value="popular">Сначала популярные</option>
                <option value="cheap">Сначала дешевле</option>
                <option value="expensive">Сначала дороже</option>
                <option value="areaAsc">По площади (возрастание)</option>
                <option value="areaDesc">По площади (убывание)</option>
            </select>
        </div>

        <div class="offices-grid" id="officesGrid">
            <div class="loading">Загрузка офисов...</div>
        </div>
    </div>

    <script>
        const mockOffices = [
            { id: 1, number: "101", floor: 5, area: 45.5, price: 150000, status: "free" },
            { id: 2, number: "205", floor: 2, area: 78.0, price: 150000, status: "occupied" },
            { id: 3, number: "312", floor: 3, area: 32.0, price: 150000, status: "free" },
            { id: 4, number: "418", floor: 4, area: 56.2, price: 150000, status: "occupied" },
            { id: 5, number: "524", floor: 5, area: 92.0, price: 150000, status: "free" },
            { id: 6, number: "102", floor: 1, area: 25.5, price: 150000, status: "free" }
        ];

        const officesGrid = document.getElementById('officesGrid');
        const officesCount = document.getElementById('officesCount');

        function renderOffices(offices) {
            if (!offices.length) {
                officesGrid.innerHTML = '<div class="empty">Нет доступных офисов</div>';
                officesCount.textContent = 0;
                return;
            }

            officesGrid.innerHTML = offices.map(office => `
                <div class="office-card" data-floor="${office.floor}" data-price="${office.price}" data-area="${office.area}">
                    <div class="office-image">
                        <div class="image-placeholder">
                            <i data-lucide="building-2" style="width: 48px; height: 48px;"></i>
                        </div>
                    </div>
                    <div class="office-content">
                        <div class="office-header">
                            <span class="office-number">Офис ${office.number}</span>
                            <span class="office-floor">${office.floor} этаж</span>
                        </div>
                        <div class="office-details">
                            <div class="detail-item">
                                <div class="detail-label">Площадь</div>
                                <div class="detail-value">${office.area} <small>м²</small></div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Ставка</div>
                                <div class="detail-value">${office.price.toLocaleString()} <small>₽/мес</small></div>
                            </div>
                        </div>
                        <div class="card-actions">
                            <button class="card-btn primary" onclick="alert('Офис ${office.number} добавлен в бронирование')">Забронировать</button>
                            <button class="card-btn secondary" onclick="alert('Подробная информация об офисе ${office.number}')">Подробнее</button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            officesCount.textContent = offices.length;
            lucide.createIcons();
        }

        renderOffices(mockOffices);
    </script>
</body>
</html>
