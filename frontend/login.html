<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Бизнес-центр</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-text.container">войти</div>
            </div>

            <div class="error-message" id="errorMessage">
                Неверный email или пароль
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Введите ваш email" required>
                </div>

                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="password" placeholder="Введите ваш пароль" required>
                </div>

                <div class="btn-container">
                    <button type="submit" class="login-btn">Войти</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (email && password) {
                window.location.href = 'dashboard.html';
            } else {
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.textContent = 'Пожалуйста, заполните все поля';
                errorDiv.classList.add('show');
            }
        });
    </script>
</body>
</html>
