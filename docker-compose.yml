version: '3.8'

services:
  db:
    image: postgres:16
    container_name: business_center_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: project
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: business_center_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    command: redis-server --appendonly yes

  api:
    build: .
    container_name: business_center_api
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: admin
      DB_NAME: project
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET_KEY: your-super-secret-key-change-in-production
    depends_on:
      - db
      - redis
    networks:
      - app-network
    volumes:
      - ./backend:/app
    command: uvicorn api.main:app --reload --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:

networks:
  app-network: