services:
  db:
    image: postgres:16
    container_name: business_center_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: project
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/full_bd.sql:/docker-entrypoint-initdb.d/full_bd.sql
    networks:
      - app-network

  api:
    build: .
    container_name: business_center_api
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: admin
      DB_NAME: project
    depends_on:
      - db
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: business_center_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
