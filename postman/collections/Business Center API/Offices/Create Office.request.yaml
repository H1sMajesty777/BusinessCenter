$kind: http-request
url: "{{base_url}}/api/offices"
method: POST
headers:
  Authorization: Bearer {{access_token}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
        "office_number": "999",
        "floor": 10,
        "area_sqm": 75.5,
        "price_per_month": 65000,
        "description": "New office with panoramic view",
        "amenities": {"wifi": true, "parking": true},
        "is_free": true
    }
order: 5000
